        </nav>
        <h2 style="text-align: center;">Formulario de contacto</h2>
        <form action="/pagina_accion.php">

            <div class="campo">
                <label for="nombre">Nombre <span class="marca-requerido">*</span></label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Ignacio" required>
            </div>

            <div class="campo">
                <label for="correo">Correo<span class="marca-requerido">*</span></label>
                <input type="email" id="correo" name="correo"
                placeholder="Ej: ignacio@gmail.com"
                pattern="^[a-zA-Z0-9._%+\-]+@gmail\.com$"
                required>
            </div>

            <div class="campo">
                <label for="fechaNacimiento">Fecha de nacimiento</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento">
            </div>

            <button type="submit">Enviar</button>
        </form>
    </main>
